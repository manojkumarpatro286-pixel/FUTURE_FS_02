<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">
<h2>Mini CRM</h2>

<ul>
<li>Dashboard</li>
<li>Leads</li>
<li>Analytics</li>
</ul>
</div>

<!-- Main Content -->

<div class="main">

<div class="topbar">

<h1>Client Leads</h1>
<div class="stats">

<div class="card">
<h3>Total Leads</h3>
<p id="totalLeads">0</p>
</div>

<div class="card">
<h3>New Leads</h3>
<p id="newLeads">0</p>
</div>

<div class="card">
<h3>Contacted</h3>
<p id="contactedLeads">0</p>
</div>

<div class="card">
<h3>Converted</h3>
<p id="convertedLeads">0</p>
</div>

</div>

<input type="text" id="search" placeholder="Search Leads..." onkeyup="searchLead()">

</div>

<!-- Add Lead -->

<div class="form-card">

<input type="text" id="name" placeholder="Client Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="source" placeholder="Source">

<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Converted</option>
</select>

<input type="text" id="notes" placeholder="Notes">

<button onclick="addLead()">Add Lead</button>

</div>

<!-- Lead Table -->
<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Source</th>
<th>Status</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="leadTable"></tbody>

</table>
<div class="charts">

<div class="chart-box">
<h3>Lead Status Distribution</h3>
<canvas id="statusChart"></canvas>
</div>

<div class="chart-box">
<h3>Lead Source Distribution</h3>
<canvas id="sourceChart"></canvas>
</div>

</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
